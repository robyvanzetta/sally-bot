<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sally - Consulente Integratori</title>

  <!-- Dialogflow Messenger -->
  <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
  <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>

  <!-- CSS esterno -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <df-messenger
    project-id="sally-493908"
    agent-id="a0dd4e46-6622-44e6-856f-9f5eb80a2eb1"
    language-code="it"
    max-query-length="-1"
    intent="WELCOME">
    
    <df-messenger-chat
      chat-title="Sally"
      chat-title-icon="https://storage.cloud.google.com/grafiche/pittogramma-colori.png">
    </df-messenger-chat>

  </df-messenger>

<script>
  window.addEventListener('df-messenger-loaded', function () {
    const messenger = document.querySelector('df-messenger');
    if (!messenger) return;

    const applyStyles = () => {
      const shadowRoot = messenger.shadowRoot;
      if (!shadowRoot) return;

      const textarea = shadowRoot.querySelector('textarea');
      if (textarea) {
        textarea.style.color = '#000000';        // testo nero
        textarea.style.backgroundColor = '#ffffff'; // sfondo bianco (puoi cambiarlo)
        textarea.style.caretColor = '#000000';   // cursore nero
      }

      // wrapper input (importante)
      const inputWrapper = shadowRoot.querySelector('[part="input-wrapper"]');
      if (inputWrapper) {
        inputWrapper.style.backgroundColor = '#ffffff';
      }

      // container input
      const inputContainer = shadowRoot.querySelector('[part="input-container"]');
      if (inputContainer) {
        inputContainer.style.backgroundColor = '#ffffff';
      }
    };

    let attempts = 0;
    const interval = setInterval(() => {
      applyStyles();
      attempts++;
      if (attempts > 15) clearInterval(interval);
    }, 300);

    setTimeout(() => {
      try {
        messenger.sendQuery('ciao');
      } catch (e) {
        console.log('Errore invio messaggio iniziale:', e);
      }
    }, 800);
  });
</script>
</body>
</html>
