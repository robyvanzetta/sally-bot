<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sally - Consulente Integratori</title>

  <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
  <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #DDD4CC;
      overflow: hidden;
      font-family: Google Sans, Arial, sans-serif;
    }

    df-messenger {
      display: block;
      width: 100vw;
      height: 100vh;
      --df-messenger-font-color: #ffffff;
      --df-messenger-font-family: Google Sans;
      --df-messenger-chat-background: #DDD4CC;
      --df-messenger-message-user-background: #906A45;
      --df-messenger-message-bot-background: #60472E;
      --df-messenger-send-icon: #8F6A45;
    }
  </style>
</head>

<body>
  <df-messenger
    project-id="sally-493908"
    agent-id="a0dd4e46-6622-44e6-856f-9f5eb80a2eb1"
    language-code="it"
    intent="WELCOME">
    <df-messenger-chat
      chat-title="Sally"
      chat-title-icon="https://storage.cloud.google.com/grafiche/pittogramma-colori.png">
    </df-messenger-chat>
  </df-messenger>

  <script>
    window.addEventListener('df-messenger-loaded', function () {
      const messenger = document.querySelector('df-messenger');
      if (!messenger) return;

      setTimeout(() => {
        try {
          messenger.sendQuery('ciao');
        } catch (e) {
          console.log('Errore invio messaggio iniziale:', e);
        }
      }, 800);
    });
  </script>
</body>
</html>
